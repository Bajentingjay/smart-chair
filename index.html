<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Chair Dashboard</title>

<!-- ✅ FIXED Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --primary: #0f172a;
    --accent: #2563eb;
    --bg: #f1f5f9;
}

body {
    background: var(--bg);
    font-family: 'Segoe UI', sans-serif;
}

/* Sidebar */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #0f172a, #1e293b);
    color: white;
    padding: 20px;
}

.nav-link {
    color: rgba(255,255,255,0.7);
    margin-bottom: 10px;
    border-radius: 10px;
    transition: 0.3s;
}

.nav-link:hover, .nav-link.active {
    background: rgba(255,255,255,0.1);
    color: white;
}

/* Main */
.main {
    margin-left: 260px;
    padding: 30px;
}

/* Cards */
.card {
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.value {
    font-size: 2rem;
    font-weight: 700;
}

/* Status colors */
.normal { color: #16a34a; }
.warning { color: #f59e0b; }
.danger { color: #dc2626; }

.status-dot {
    font-size: 12px;
}

/* Hover effect */
.card:hover {
    transform: translateY(-4px);
    transition: 0.2s;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar d-flex flex-column">
    <h4 class="fw-bold">SMART CHAIR</h4>

    <nav class="nav flex-column mt-4">
        <a class="nav-link active">🏠 Dashboard</a>
        <a class="nav-link">🕒 History</a>
        <a class="nav-link">📄 Reports</a>
        <a class="nav-link">⚙️ Settings</a>
    </nav>

    <div class="mt-auto">
        <p class="small mt-4">Chair Status:</p>
        <span class="text-success">● Connected</span>
    </div>
</div>

<!-- Main -->
<div class="main">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold">Welcome, User</h3>
            <p class="text-muted">Real-time health monitoring</p>
        </div>
    </div>

    <!-- Vitals -->
    <div class="row g-4 mb-4">

        <!-- Heart Rate -->
        <div class="col-md-3">
            <div class="card p-3 border-start border-danger border-4">
                <p class="text-muted mb-1">Heart Rate</p>
                <div class="value">
                    <span id="hr-val">--</span> bpm
                </div>
                <span id="hr-status" class="status-dot">● Checking...</span>
            </div>
        </div>

        <!-- Temperature -->
        <div class="col-md-3">
            <div class="card p-3 border-start border-warning border-4">
                <p class="text-muted mb-1">Temperature</p>
                <div class="value">
                    <span id="temp-val">--</span> °C
                </div>
                <span id="temp-status">● --</span>
            </div>
        </div>

        <!-- SpO2 -->
        <div class="col-md-3">
            <div class="card p-3 border-start border-primary border-4">
                <p class="text-muted mb-1">SpO2</p>
                <div class="value">
                    <span id="spo2-val">--</span> %
                </div>
                <span id="spo2-status">● --</span>
            </div>
        </div>

        <!-- Battery -->
        <div class="col-md-3">
            <div class="card p-3 border-start border-success border-4">
                <p class="text-muted mb-1">Battery</p>
                <div class="value">
                    <span id="bat-val">--</span> %
                </div>
                <span id="bat-status">● --</span>
            </div>
        </div>

    </div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyChgNvn_pH25hYiEF84M60spNJ1tlvqQuc",
  authDomain: "iot-based-smart-chair.firebaseapp.com",
  databaseURL: "https://iot-based-smart-chair-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "iot-based-smart-chair",
  storageBucket: "iot-based-smart-chair.firebasestorage.app",
  messagingSenderId: "251027409495",
  appId: "1:251027409495:web:b9f448410d4693e22ff112"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const vitalsRef = ref(db, "vitals");

onValue(vitalsRef, (snapshot) => {
    const d = snapshot.val();
    if (!d) return;

    // Values
    document.getElementById("hr-val").innerText = d.heartrate ?? "--";
    document.getElementById("spo2-val").innerText = d.spo2 ?? "--";
    document.getElementById("temp-val").innerText = d.temperature ?? "--";
    document.getElementById("bat-val").innerText = d.battery ?? "--";

    // ✅ Smart Status Logic
    setStatus("hr", d.heartrate, 60, 100);
    setStatus("spo2", d.spo2, 95, 100);
    setStatus("temp", d.temperature, 36, 37.5);
    setStatus("bat", d.battery, 20, 100);
});

// Status function
function setStatus(type, value, min, max) {
    let el = document.getElementById(type + "-status");

    if (value == null) {
        el.innerText = "● No Data";
        el.className = "warning";
        return;
    }

    if (value >= min && value <= max) {
        el.innerText = "● Normal";
        el.className = "normal";
    } else if (value < min) {
        el.innerText = "● Low";
        el.className = "warning";
    } else {
        el.innerText = "● High";
        el.className = "danger";
    }
}
</script>

</body>
</html>
