<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTU HEALTH MONITORING SYSTEM</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100">

<!-- SIDEBAR -->
<aside class="fixed w-72 h-full bg-[#0a1629] text-white p-6">

    <!-- LOGO -->
    <div class="flex items-center gap-3 mb-10">
        <div class="w-12 h-12 bg-white rounded-full overflow-hidden">
            <img src="https://upload.wikimedia.org/wikipedia/en/4/4c/Cebu_Technological_University_logo.png">
        </div>
        <div>
            <h1 class="font-bold">CTU HEALTH</h1>
            <p class="text-xs text-gray-400">CLINICAL VANGUARD</p>
        </div>
    </div>

    <!-- NAV -->
    <nav class="space-y-2">
        <button onclick="showPage('dashboard')" class="nav-btn w-full text-left p-3 bg-blue-600 rounded">Dashboard</button>
        <button onclick="showPage('history')" class="nav-btn w-full text-left p-3 hover:bg-gray-700 rounded">History</button>
        <button onclick="showPage('reports')" class="nav-btn w-full text-left p-3 hover:bg-gray-700 rounded">Reports</button>
        <button onclick="showPage('settings')" class="nav-btn w-full text-left p-3 hover:bg-gray-700 rounded">Settings</button>
    </nav>

</aside>

<!-- MAIN -->
<main class="ml-72 p-10">

    <h2 id="title" class="text-2xl font-bold mb-6">Dashboard</h2>

    <!-- DASHBOARD -->
    <div id="dashboard" class="page">
        <div class="grid grid-cols-3 gap-6">

            <div class="bg-white p-6 rounded shadow">
                <p>Active Users</p>
                <h1 class="text-3xl font-bold">1,284</h1>
            </div>

            <div class="bg-white p-6 rounded shadow">
                <p>Posture Alerts</p>
                <h1 class="text-3xl font-bold text-red-500">23</h1>
            </div>

            <div class="bg-white p-6 rounded shadow">
                <p>System Status</p>
                <h1 class="text-green-500 font-bold">ACTIVE</h1>
            </div>

        </div>

        <!-- CHART -->
        <div class="bg-white p-6 mt-6 rounded shadow">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="page hidden">
        <div class="bg-white p-6 rounded shadow">
            <h3 class="font-bold mb-3">User Logs</h3>
            <p>No data yet...</p>
        </div>
    </div>

    <!-- REPORTS -->
    <div id="reports" class="page hidden">
        <div class="bg-white p-6 rounded shadow">
            <h3 class="font-bold mb-3">Reports</h3>
            <p>Generate reports soon...</p>
        </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="page hidden">
        <div class="bg-white p-6 rounded shadow">
            <h3 class="font-bold mb-3">System Settings</h3>
            <p>Configuration panel...</p>
        </div>
    </div>

</main>

<script>
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    document.getElementById('title').innerText = pageId.charAt(0).toUpperCase() + pageId.slice(1);
}

// Chart
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
        datasets: [{
            label: 'Posture Alerts',
            data: [12, 19, 8, 15, 10, 5, 7],
            borderWidth: 2
        }]
    }
});
</script>

</body>
</html>
