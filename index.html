<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chair Vitals</title>

    <!-- ✅ FIXED Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .vitals-card { 
            transition: transform 0.2s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border: none; 
            border-radius: 15px; 
        }
        .vitals-card:hover { transform: translateY(-5px); }
        body { background-color: #f8f9fa; }
        .display-1 { font-size: 5rem; }
    </style>
</head>
<body>

<div class="container py-5 text-center">
    <header class="pb-3 mb-5 border-bottom">
        <h1 class="h3 fw-bold text-primary">🏥 Smart Chair Health Dashboard</h1>
    </header>

    <div class="row justify-content-center">
        <!-- Heart Rate -->
        <div class="col-md-5 mb-4">
            <div class="card h-100 p-4 text-white bg-danger vitals-card">
                <h2 class="h5 text-uppercase">Heart Rate</h2>
                <p class="display-1 fw-bold mb-0"><span id="hr-val">--</span></p>
                <span class="fs-4 text-white-50">BPM</span>
            </div>
        </div>

        <!-- SpO2 -->
        <div class="col-md-5 mb-4">
            <div class="card h-100 p-4 bg-white border vitals-card">
                <h2 class="h5 text-uppercase text-muted">SpO2 Level</h2>
                <p class="display-1 fw-bold text-primary mb-0"><span id="spo2-val">--</span></p>
                <span class="fs-4 text-muted">%</span>
            </div>
        </div>
    </div>
</div>

<!-- ✅ FIXED Firebase Imports -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyChgNvn_pH25hYiEF84M60spNJ1tlvqQuc",
      authDomain: "iot-based-smart-chair.firebaseapp.com",
      databaseURL: "https://iot-based-smart-chair-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "iot-based-smart-chair",
      storageBucket: "iot-based-smart-chair.firebasestorage.app",
      messagingSenderId: "251027409495",
      appId: "1:251027409495:web:b9f448410d4693e22ff112"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const vitalsRef = ref(database, 'vitals');

    onValue(vitalsRef, (snapshot) => {
        const data = snapshot.val();
        console.log("Live Data:", data); 

        if (data) {
            document.getElementById('hr-val').innerText = data.heartrate ?? "--";
            document.getElementById('spo2-val').innerText = data.spo2 ?? "--";
        }
    }, (error) => {
        console.error("Firebase Error:", error);
    });
</script>

</body>
</html>
