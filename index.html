<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEBU TECHNOLOGICAL UNIVERSITY - Smart Chair Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --primary: #0f172a;
    --accent: #2563eb;
    --bg: #f1f5f9;
}

body {
    background: var(--bg);
    font-family: 'Segoe UI', sans-serif;
}

/* Sidebar */
.sidebar {
    width: 260px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #0f172a, #1e293b);
    color: white;
    padding: 20px;
}

/* University Title */
.sidebar h4 {
    font-size: 14px;
    line-height: 1.4;
}

.nav-link {
    color: rgba(255,255,255,0.7);
    border-radius: 10px;
    margin-bottom: 10px;
}

.nav-link.active, .nav-link:hover {
    background: rgba(255,255,255,0.1);
    color: white;
}

/* Main */
.main {
    margin-left: 270px;
    padding: 30px;
}

/* Header */
.header-box {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

/* Cards */
.card {
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

/* Values */
.value {
    font-size: 2rem;
    font-weight: bold;
}

/* Status */
.normal { color: #16a34a; font-weight: bold; }
.warning { color: #f59e0b; font-weight: bold; }
.danger { color: #dc2626; font-weight: bold; }

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar d-flex flex-column">

    <!-- UPDATED NAME -->
    <h4 class="fw-bold">
        CEBU TECHNOLOGICAL<br>
        UNIVERSITY
    </h4>

    <nav class="nav flex-column mt-4">
        <a class="nav-link active">🏠 Dashboard</a>
        <a class="nav-link">🕒 History</a>
        <a class="nav-link">📄 Reports</a>
        <a class="nav-link">⚙️ Settings</a>
    </nav>

    <div class="mt-auto">
        <p>Status:</p>
        <span class="text-success fw-bold">● Connected</span>
    </div>
</div>

<!-- Main -->
<div class="main">

    <!-- Header -->
    <div class="header-box mb-4">
        <h3 class="fw-bold">SMART CHAIR MONITORING SYSTEM</h3>
        <p class="text-muted mb-0">Real-time vital signs visualization</p>
    </div>

    <!-- Vitals -->
    <div class="row g-4 mb-4">

        <div class="col-md-3">
            <div class="card p-3">
                <p class="text-muted">Heart Rate</p>
                <div class="value"><span id="hr-val">--</span> bpm</div>
                <span id="hr-status">● --</span>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <p class="text-muted">SpO2</p>
                <div class="value"><span id="spo2-val">--</span> %</div>
                <span id="spo2-status">● --</span>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <p class="text-muted">Temperature</p>
                <div class="value"><span id="temp-val">--</span> °C</div>
                <span id="temp-status">● --</span>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <p class="text-muted">Battery</p>
                <div class="value"><span id="bat-val">--</span> %</div>
                <span id="bat-status">● --</span>
            </div>
        </div>

    </div>

    <!-- Charts -->
    <div class="row g-4">

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Heart Rate Trend</h5>
                <canvas id="hrChart"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>SpO2 Trend</h5>
                <canvas id="spo2Chart"></canvas>
            </div>
        </div>

    </div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "iot-based-smart-chair.firebaseapp.com",
  databaseURL: "https://iot-based-smart-chair-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "iot-based-smart-chair",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const vitalsRef = ref(db, "vitals");

// Chart Setup
const hrData = [];
const spo2Data = [];
const labels = [];

const hrChart = new Chart(document.getElementById("hrChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Heart Rate",
            data: hrData,
            borderColor: "#2563eb",
            tension: 0.4
        }]
    }
});

const spo2Chart = new Chart(document.getElementById("spo2Chart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "SpO2",
            data: spo2Data,
            borderColor: "#16a34a",
            tension: 0.4
        }]
    }
});

// Firebase Listener
onValue(vitalsRef, (snap) => {
    const d = snap.val();
    if (!d) return;

    const time = new Date().toLocaleTimeString();

    document.getElementById("hr-val").innerText = d.heartrate ?? "--";
    document.getElementById("spo2-val").innerText = d.spo2 ?? "--";
    document.getElementById("temp-val").innerText = d.temperature ?? "--";
    document.getElementById("bat-val").innerText = d.battery ?? "--";

    setStatus("hr", d.heartrate, 60, 100);
    setStatus("spo2", d.spo2, 95, 100);
    setStatus("temp", d.temperature, 36, 37.5);
    setStatus("bat", d.battery, 20, 100);

    labels.push(time);
    hrData.push(d.heartrate);
    spo2Data.push(d.spo2);

    if (labels.length > 10) {
        labels.shift();
        hrData.shift();
        spo2Data.shift();
    }

    hrChart.update();
    spo2Chart.update();
});

function setStatus(type, value, min, max) {
    let el = document.getElementById(type + "-status");

    if (value >= min && value <= max) {
        el.innerText = "● NORMAL";
        el.className = "normal";
    } else if (value < min) {
        el.innerText = "● LOW";
        el.className = "warning";
    } else {
        el.innerText = "● HIGH";
        el.className = "danger";
    }
}
</script>

</body>
</html>
